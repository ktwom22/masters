{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: auto; text-align: center;">
    <h1>Forgot Password?</h1>
    <p>Enter your username below. Since this is a private pool, please contact the Admin ({{ admin_name|default('the commissioner') }}) after submitting to verify your identity.</p>
    
    <form method="POST">
        <input type="text" name="username" placeholder="Your Username" required>
        <button type="submit" class="btn" style="width: 100%;">Request Reset</button>
    </form>
    
    <p style="margin-top: 20px;">
        <a href="/login">Back to Login</a>
    </p>
</div>
{% endblock %}
