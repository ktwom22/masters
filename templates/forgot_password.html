{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-4 text-center">
                    <div class="mb-3">
                        <span class="display-4">🔑</span>
                    </div>
                    <h2 class="fw-bold text-success mb-3">Forgot Password?</h2>
                    <p class="text-muted small">No worries. Enter your email below and we'll send you a link to get back into the tournament.</p>

                    <form method="POST">
                        <div class="mb-3 text-start">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="golfer@augusta.com" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold py-2 mb-3">
                            Send Reset Link
                        </button>
                    </form>

                    <a href="{{ url_for('login') }}" class="text-decoration-none small text-secondary">
                        ← Back to Clubhouse Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
